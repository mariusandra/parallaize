services:
  postgres:
    image: postgres:16-alpine
    container_name: parallaize-postgres
    restart: unless-stopped
    env_file:
      - ./postgres.env.local
    environment:
      POSTGRES_DB: parallaize
      POSTGRES_USER: parallaize
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - parallaize-postgres-data:/var/lib/postgresql/data

volumes:
  parallaize-postgres-data:
