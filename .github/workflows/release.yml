name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to publish, or patch/minor/major to bump from the latest release
        required: true
        default: patch
        type: string
      package_release:
        description: Package release suffix for Debian artifacts
        required: false
        default: "1"
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: default
    timeout-minutes: 90
    env:
      VERSION_INPUT: ${{ github.event.inputs.version }}
      PACKAGE_RELEASE: ${{ github.event.inputs.package_release }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: true

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure the release runs from main
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Release publishing only runs from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: resolve_version
        run: |
          set -euo pipefail
          release_version="$(pnpm release:version -- --version "${VERSION_INPUT}" --resolve-only)"
          echo "Resolved release version: ${release_version}"
          echo "RELEASE_VERSION=${release_version}" >> "${GITHUB_ENV}"
          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"

      - name: Run test suite
        run: pnpm test

      - name: Validate release secrets
        run: |
          set -euo pipefail
          : "${R2_ACCOUNT_ID:?Missing R2_ACCOUNT_ID secret}"
          : "${R2_BUCKET:?Missing R2_BUCKET secret}"
          : "${AWS_ACCESS_KEY_ID:?Missing R2_ACCESS_KEY_ID secret}"
          : "${AWS_SECRET_ACCESS_KEY:?Missing R2_SECRET_ACCESS_KEY secret}"
          aws --version

      - name: Update versioned release files
        run: pnpm release:version -- --version "${RELEASE_VERSION}" --package-release "${PACKAGE_RELEASE}"

      - name: Build release packages
        run: |
          set -euo pipefail
          pnpm package:prepare
          node scripts/build-packages.mjs \
            --format deb \
            --arch amd64,arm64 \
            --version "${RELEASE_VERSION}" \
            --release "${PACKAGE_RELEASE}"

      - name: Upload package artifacts to Cloudflare R2
        run: |
          set -euo pipefail
          aws s3 cp artifacts/packages "s3://${R2_BUCKET}/packages/" \
            --recursive \
            --endpoint-url "${R2_ENDPOINT_URL}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parallaize-release-${{ steps.resolve_version.outputs.release_version }}-${{ env.PACKAGE_RELEASE }}
          path: artifacts/packages/
          if-no-files-found: error

      - name: Resolve release tag
        run: |
          set -euo pipefail
          if [ "${PACKAGE_RELEASE}" = "1" ]; then
            release_tag="v${RELEASE_VERSION}"
          else
            release_tag="v${RELEASE_VERSION}-${PACKAGE_RELEASE}"
          fi
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"

      - name: Commit release version updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json docs/index.html docs/packaging.md
          git commit -m "chore: release ${RELEASE_VERSION}-${PACKAGE_RELEASE}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Create and push release tag
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release tag ${RELEASE_TAG} already exists on origin." >&2
            exit 1
          fi
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Parallaize ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/packages/parallaize_${{ steps.resolve_version.outputs.release_version }}-${{ env.PACKAGE_RELEASE }}_amd64.deb
            artifacts/packages/parallaize_${{ steps.resolve_version.outputs.release_version }}-${{ env.PACKAGE_RELEASE }}_arm64.deb
