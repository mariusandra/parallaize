name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to publish, or patch/minor/major to bump from the latest release
        required: true
        default: patch
        type: string
      package_release:
        description: Package release suffix for Debian artifacts
        required: false
        default: "1"
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: default
    timeout-minutes: 90
    env:
      VERSION_INPUT: ${{ github.event.inputs.version }}
      PACKAGE_RELEASE: ${{ github.event.inputs.package_release }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_RELEASE_NOTES_MODEL: ${{ vars.OPENAI_RELEASE_NOTES_MODEL }}
      OPENAI_RELEASE_NOTES_BASE_URL: ${{ vars.OPENAI_RELEASE_NOTES_BASE_URL }}
      APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
      APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
      APT_GPG_SIGNING_KEY_ID: ${{ secrets.APT_GPG_SIGNING_KEY_ID }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: true

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure the release runs from main
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Release publishing only runs from main. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: pnpm

      - name: Set temporary GnuPG home
        run: |
          set -euo pipefail
          echo "GNUPGHOME=${RUNNER_TEMP}/parallaize-gnupg" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: resolve_version
        run: |
          set -euo pipefail
          release_version="$(node scripts/update-release-version.mjs --version "${VERSION_INPUT}" --resolve-only)"
          echo "Resolved release version: ${release_version}"
          echo "RELEASE_VERSION=${release_version}" >> "${GITHUB_ENV}"
          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"

      - name: Resolve release tag
        run: |
          set -euo pipefail
          if [ "${PACKAGE_RELEASE}" = "1" ]; then
            release_tag="v${RELEASE_VERSION}"
          else
            release_tag="v${RELEASE_VERSION}-${PACKAGE_RELEASE}"
          fi
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"

      - name: Run test suite
        run: pnpm test

      - name: Validate release secrets
        run: |
          set -euo pipefail
          : "${APT_GPG_PRIVATE_KEY:?Missing APT_GPG_PRIVATE_KEY secret}"
          : "${APT_GPG_PASSPHRASE:?Missing APT_GPG_PASSPHRASE secret}"
          : "${APT_GPG_SIGNING_KEY_ID:?Missing APT_GPG_SIGNING_KEY_ID secret}"
          : "${R2_ACCOUNT_ID:?Missing R2_ACCOUNT_ID secret}"
          : "${R2_BUCKET:?Missing R2_BUCKET secret}"
          : "${AWS_ACCESS_KEY_ID:?Missing R2_ACCESS_KEY_ID secret}"
          : "${AWS_SECRET_ACCESS_KEY:?Missing R2_SECRET_ACCESS_KEY secret}"
          aws --version
          gpg --version | head -n 1

      - name: Import APT archive signing key
        run: |
          set -euo pipefail
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"
          printf '%s\n' "${APT_GPG_PRIVATE_KEY}" | gpg --batch --import
          gpg --batch --list-secret-keys "${APT_GPG_SIGNING_KEY_ID}"

      - name: Generate release notes body
        run: |
          set -euo pipefail
          node scripts/generate-release-notes.mjs \
            --release-version "${RELEASE_VERSION}" \
            --package-release "${PACKAGE_RELEASE}" \
            --release-tag "${RELEASE_TAG}" \
            --github-repository "${GITHUB_REPOSITORY}" \
            --github-server-url "${GITHUB_SERVER_URL}" \
            --output artifacts/release-notes.md

      - name: Update versioned release files
        run: node scripts/update-release-version.mjs --version "${RELEASE_VERSION}" --package-release "${PACKAGE_RELEASE}"

      - name: Build release packages
        env:
          PARALLAIZE_PACKAGE_RELEASE: ${{ env.PACKAGE_RELEASE }}
        run: |
          set -euo pipefail
          pnpm package:prepare
          node scripts/build-packages.mjs \
            --format deb \
            --arch amd64,arm64 \
            --version "${RELEASE_VERSION}" \
            --release "${PACKAGE_RELEASE}"

      - name: Build signed APT repository
        run: |
          set -euo pipefail
          node scripts/build-apt-repo.mjs \
            --deb-dir artifacts/packages \
            --output-dir artifacts/apt \
            --suite noble \
            --codename noble \
            --component main \
            --arch amd64 \
            --base-url https://archive.parallaize.com/apt \
            --signed-by-path /etc/apt/keyrings/parallaize-archive-keyring.gpg \
            --signing-key-id "${APT_GPG_SIGNING_KEY_ID}"

      - name: Append APT archive details to release notes
        run: |
          set -euo pipefail
          archive_fingerprint="$(tr -d '\n' < artifacts/apt/parallaize-archive-keyring.fingerprint)"
          source_entry="$(tr -d '\n' < artifacts/apt/parallaize.list)"
          {
            printf '\n## APT Archive\n'
            printf -- '- Ubuntu 24.04 source entry: `%s`\n' "${source_entry}"
            printf -- '- Archive signing key fingerprint: `%s`\n' "${archive_fingerprint}"
            printf -- '- Public key files: `parallaize-archive-keyring.gpg` and `parallaize-archive-keyring.asc`\n'
          } >> artifacts/release-notes.md

      - name: Upload package artifacts to Cloudflare R2
        run: |
          set -euo pipefail
          aws s3 cp artifacts/packages "s3://${R2_BUCKET}/packages/" \
            --recursive \
            --endpoint-url "${R2_ENDPOINT_URL}"
          aws s3 cp artifacts/apt "s3://${R2_BUCKET}/apt/" \
            --recursive \
            --endpoint-url "${R2_ENDPOINT_URL}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parallaize-release-${{ steps.resolve_version.outputs.release_version }}-${{ env.PACKAGE_RELEASE }}
          path: |
            artifacts/packages/
            artifacts/apt/
            artifacts/release-notes.md
          if-no-files-found: error

      - name: Commit release version updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json docs/index.html docs/latest.json docs/packaging.md
          git commit -m "chore: release ${RELEASE_VERSION}-${PACKAGE_RELEASE}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Create and push release tag
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release tag ${RELEASE_TAG} already exists on origin." >&2
            exit 1
          fi
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Parallaize ${{ env.RELEASE_TAG }}
          body_path: artifacts/release-notes.md
          fail_on_unmatched_files: true
          files: |
            artifacts/packages/parallaize_${{ steps.resolve_version.outputs.release_version }}-${{ env.PACKAGE_RELEASE }}_amd64.deb
            artifacts/packages/parallaize_${{ steps.resolve_version.outputs.release_version }}-${{ env.PACKAGE_RELEASE }}_arm64.deb
            artifacts/apt/parallaize-archive-keyring.gpg
            artifacts/apt/parallaize-archive-keyring.asc
            artifacts/apt/parallaize.list
            artifacts/apt/parallaize.sources
